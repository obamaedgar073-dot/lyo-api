[build]
command = "npm ci && npx prisma generate && npx prisma migrate deploy && npm run build"

[deploy]
startCommand = "node -e \"const { register } = require('tsconfig-paths'); const { compilerOptions } = require('./tsconfig.json'); register({ baseUrl: './dist', paths: {'@/*': ['*']} }); require('./dist/server.js');\""
healthcheckPath = "/health"
healthcheckTimeout = 30